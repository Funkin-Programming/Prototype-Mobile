name: Build Android

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Accept Licenses and Setup NDK
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;21.4.7075529"
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-33"

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.2.5

      - name: Install Libraries
        run: |
          haxelib setup ~/haxelib
          haxelib git hxcpp https://github.com/AlafandyPorting/hxcpp-2.git --quiet
          haxelib install lime          7.9.0  --quiet
          haxelib install openfl        9.1.0  --quiet
          haxelib install flixel        4.11.0 --quiet
          haxelib install flixel-addons 2.11.0 --quiet
          haxelib set lime          7.9.0
          haxelib set openfl        9.1.0
          haxelib set flixel        4.11.0
          haxelib set flixel-addons 2.11.0

      - name: Configure Android
        run: |
          haxelib run lime setup android -alias -accept
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_HOME/ndk/21.4.7075529
          haxelib run lime config JAVA_HOME $JAVA_HOME

      - name: Compile
        run: haxelib run lime build android -debug

      - uses: actions/upload-artifact@v4
        with:
          name: Prototype-Android
          path: export/debug/android/bin/app/build/outputs/apk/debug/Prototype-debug.apk
          if-no-files-found: error
