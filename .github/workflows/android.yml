name: Build Android

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.2.5

      - name: Install Libraries
        run: |
          haxelib setup ~/haxelib
          haxelib git hxcpp https://github.com/AlafandyPorting/hxcpp-2.git --quiet
          haxelib install lime          7.9.0  --quiet
          haxelib install openfl        9.1.0  --quiet
          haxelib install flixel        4.11.0 --quiet
          haxelib install flixel-addons 2.11.0 --quiet
          haxelib set lime          7.9.0
          haxelib set openfl        9.1.0
          haxelib set flixel        4.11.0
          haxelib set flixel-addons 2.11.0

      - name: Generate Keystore
        run: |
          keytool -genkeypair -v \
            -keystore key.keystore \
            -storetype JKS \
            -alias prototype \
            -storepass prototype \
            -keypass prototype \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Prototype, O=Dev, C=BR"

      - name: Configure Android
        run: |
          haxelib run lime setup android -alias -accept
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_LATEST_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME

      - name: Compile
        run: haxelib run lime build android -debug

      - uses: actions/upload-artifact@v4
        with:
          name: Prototype-Android
          path: export/release/android/bin/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error