name: Build Android

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup NDK and SDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;21.4.7075529"
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-33"
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.0"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.2.5

      - name: Cache Haxelib
        uses: actions/cache@v4
        with:
          path: ~/haxelib
          key: haxelib-${{ hashFiles('**/Project.xml') }}
          restore-keys: haxelib-

      - name: Cache hxcpp
        uses: actions/cache@v4
        with:
          path: ~/.hxcpp
          key: hxcpp-android-${{ hashFiles('**/Project.xml') }}
          restore-keys: hxcpp-android-

      - name: Install Libraries
        run: |
          haxelib setup ~/haxelib
          haxelib git hxcpp https://github.com/AlafandyPorting/hxcpp-2.git --quiet
          haxelib install lime          7.9.0  --quiet
          haxelib install openfl        9.1.0  --quiet
          haxelib install flixel        4.11.0 --quiet
          haxelib install flixel-addons 2.11.0 --quiet
          haxelib set lime          7.9.0
          haxelib set openfl        9.1.0
          haxelib set flixel        4.11.0
          haxelib set flixel-addons 2.11.0

      - name: Generate Keystore
        run: |
          keytool -genkeypair -v \
            -keystore key.keystore \
            -storetype JKS \
            -alias prototype \
            -storepass prototype \
            -keypass prototype \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Prototype, O=Dev, C=BR"

      - name: Configure Android
        run: |
          haxelib run lime setup android -alias -accept
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_HOME/ndk/21.4.7075529
          haxelib run lime config JAVA_HOME $JAVA_HOME

      - name: Compile
        run: haxelib run lime build android -release

      - name: Find APK
        run: find export/ -name "*.apk" -type f

      - name: Setup build-tools
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0"

      - name: Re-sign APK
        run: |
          APK=$(find export/ -name "*.apk" | head -1)
          $ANDROID_HOME/build-tools/34.0.0/zipalign -v -p 4 $APK aligned.apk
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks key.keystore \
            --ks-key-alias prototype \
            --ks-pass pass:prototype \
            --key-pass pass:prototype \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out signed.apk \
            aligned.apk
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose signed.apk

      - uses: actions/upload-artifact@v4
        with:
          name: Prototype-Android
          path: signed.apk
          if-no-files-found: error